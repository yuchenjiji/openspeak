name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file from Secrets
        run: |
          echo "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" >> .env
          echo "AZURE_OPENAI_DEPLOYMENT_ID=${{ secrets.AZURE_OPENAI_DEPLOYMENT_ID }}" >> .env
          echo "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" >> .env
          echo "AZURE_OPENAI_API_VERSION=2024-12-01-preview" >> .env
          echo "AZURE_SPEECH_KEY=${{ secrets.AZURE_SPEECH_KEY }}" >> .env
          echo "AZURE_SPEECH_REGION=${{ secrets.AZURE_SPEECH_REGION }}" >> .env
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> .env
          echo "CLOUDFLARE_AI_API_TOKEN=${{ secrets.CLOUDFLARE_AI_API_TOKEN }}" >> .env
          echo "USE_MOCK_SERVICES=false" >> .env

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload and QR Code
        run: |
          # 使用 file.io 上传并用 jq 解析出 link
          RESPONSE=$(curl -F "file=@build/app/outputs/flutter-apk/app-release.apk" https://file.io)
          URL=$(echo $RESPONSE | jq -r .link)
          echo "---------------------------------------------------------------"
          echo "   APK IS READY FOR DOWNLOAD"
          echo "   Link: $URL"
          echo "   Scan the QR code below on your phone:"
          echo "---------------------------------------------------------------"
          curl -s "https://qrenco.de/$URL"
          echo "---------------------------------------------------------------"

      - name: Keep Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk